<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Load Nine — 戦闘力ランキング</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --ink:    #0c0e12;
  --ink2:   #141720;
  --ink3:   #1c2028;
  --ink4:   #252a34;
  --gold:   #c9a84c;
  --gold2:  #e8ca7a;
  --silver: #9fb3c0;
  --bronze: #a0724a;
  --dim:    rgba(255,255,255,0.08);
  --dim2:   rgba(255,255,255,0.14);
  --dim3:   rgba(255,255,255,0.04);
  --txt:    #e6e0d4;
  --txt2:   #7a8494;
  --txt3:   #4a5060;
  --r01:#5a9fe0; --r02:#4cc49a; --r03:#e0a84a;
  --r04:#d46898; --r05:#9a8fe0; --r06:#e07050;
  --r07:#e05a5a; --r08:#7ac050; --r09:#40b890; --r10:#b07ac0;
  --fs-xl:clamp(1.4rem,4vw,2rem);
  --fs-lg:clamp(1rem,2.5vw,1.25rem);
  --fs-md:clamp(0.8rem,2vw,0.9rem);
  --fs-sm:clamp(0.7rem,1.8vw,0.78rem);
  --radius:12px;
  --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Meiryo','メイリオ',sans-serif;
  background:var(--ink);
  color:var(--txt);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── noise overlay ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* ── header ── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(12,14,18,0.92);
  backdrop-filter:blur(16px) saturate(1.4);
  -webkit-backdrop-filter:blur(16px) saturate(1.4);
  border-bottom:1px solid var(--dim);
  padding:env(safe-area-inset-top,0) 0 0;
}
.hd-inner{padding:16px 18px 0;}
.hd-top{display:flex;align-items:flex-end;gap:10px;margin-bottom:12px;}
.hd-title{
  font-family:'Meiryo','メイリオ',sans-serif;
  font-size:var(--fs-xl);
  font-weight:700;
  letter-spacing:.12em;
  background:linear-gradient(135deg,var(--gold2) 0%,var(--gold) 50%,#a07030 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
.hd-sub{font-size:var(--fs-sm);color:var(--txt2);letter-spacing:.06em;padding-bottom:2px;}

.stats-row{display:flex;gap:0;margin-bottom:0;overflow-x:auto;scrollbar-width:none;}
.stats-row::-webkit-scrollbar{display:none;}
.stat-chip{
  flex:none;
  display:flex;flex-direction:column;align-items:center;
  padding:8px 16px;
  border-right:1px solid var(--dim);
  gap:2px;
}
.stat-chip:last-child{border-right:none;}
.sc-label{font-size:10px;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.sc-val{font-family:'Meiryo','メイリオ',sans-serif;font-size:clamp(0.9rem,2.5vw,1.1rem);font-weight:600;color:var(--gold);white-space:nowrap;}

/* ── tabs ── */
.tabs{
  display:flex;overflow-x:auto;scrollbar-width:none;
  border-top:1px solid var(--dim);
  margin-top:10px;
  gap:0;
}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:none;
  background:none;border:none;
  font-family:'Meiryo','メイリオ',sans-serif;
  font-size:var(--fs-sm);font-weight:500;
  color:var(--txt2);
  padding:11px 18px;
  cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  transition:color .2s,border-color .2s;
  white-space:nowrap;letter-spacing:.04em;
}
.tab-btn:hover{color:var(--txt);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ── content ── */
.tab-pane{display:none;padding:18px 16px 80px;animation:fadeUp .22s ease;}
.tab-pane.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── filters ── */
.filter-bar{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:14px;
}
.filter-bar .full{grid-column:1/-1;}
.fi{
  display:flex;align-items:center;gap:8px;
  background:var(--ink3);
  border:1px solid var(--dim);
  border-radius:var(--radius-sm);
  padding:9px 12px;
  transition:border-color .2s;
}
.fi:focus-within{border-color:var(--gold);}
.fi-icon{color:var(--txt3);flex-shrink:0;width:14px;height:14px;}
.fi-label{font-size:11px;color:var(--txt3);white-space:nowrap;}
input[type=text],input[type=number],select{
  background:none;border:none;outline:none;
  color:var(--txt);
  font-family:'Meiryo','メイリオ',sans-serif;
  font-size:var(--fs-sm);
  width:100%;
  min-width:0;
}
input[type=text]::placeholder{color:var(--txt3);}
input[type=number]{width:54px;text-align:center;font-family:'Meiryo','メイリオ',sans-serif;font-size:.85rem;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
select option{background:var(--ink2);}
.fi-sep{color:var(--txt3);font-size:11px;flex-shrink:0;}

.filter-actions{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  margin-top:2px;
}
.btn-reset{
  background:none;border:1px solid var(--dim2);border-radius:20px;
  color:var(--txt2);font-family:'Meiryo','メイリオ',sans-serif;
  font-size:11px;padding:5px 14px;cursor:pointer;
  transition:all .15s;
}
.btn-reset:hover{border-color:var(--gold);color:var(--gold);}
.match-count{font-size:12px;color:var(--txt2);}
.match-count em{font-style:normal;font-family:'Meiryo','メイリオ',sans-serif;font-size:14px;color:var(--gold);}

/* ── table ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);border:1px solid var(--dim);}
table{width:100%;border-collapse:collapse;min-width:460px;}
thead th{
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--txt3);font-weight:500;
  padding:10px 12px;text-align:left;
  background:var(--ink2);
  border-bottom:1px solid var(--dim);
  cursor:pointer;user-select:none;white-space:nowrap;
  transition:color .15s;
}
thead th:hover{color:var(--gold);}
thead th.sorted{color:var(--gold);}
.si{font-size:9px;opacity:.5;margin-left:3px;}
thead th.sorted .si{opacity:1;}
tbody tr{border-bottom:1px solid var(--dim3);transition:background .12s;}
tbody tr:hover{background:rgba(201,168,76,0.04);}
tbody tr:last-child{border-bottom:none;}
td{padding:10px 12px;font-size:var(--fs-sm);vertical-align:middle;}
.td-rank{font-family:'Meiryo','メイリオ',sans-serif;font-size:.95rem;font-weight:600;color:var(--txt3);width:52px;}
.td-rank.r1{color:var(--gold2);}
.td-rank.r2{color:var(--silver);}
.td-rank.r3{color:var(--bronze);}
.td-player{font-weight:500;font-size:.82rem;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sv-badge{
  font-size:10px;font-weight:500;
  padding:2px 8px;border-radius:20px;
  display:inline-block;white-space:nowrap;
}
.td-guild{font-size:.72rem;color:var(--txt2);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-bp{
  font-family:'Meiryo','メイリオ',sans-serif;font-size:.88rem;font-weight:600;
  text-align:right;white-space:nowrap;
}
.bp-row{display:flex;align-items:center;gap:7px;justify-content:flex-end;}
.bp-track{width:60px;height:2px;background:var(--dim);border-radius:1px;flex-shrink:0;}
.bp-fill{height:2px;border-radius:1px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold2) 100%);}
.empty-row td{text-align:center;padding:48px 16px;color:var(--txt3);font-size:.85rem;}

/* サーバー色 */
.sv-r01{background:rgba(90,159,224,.12);color:#7abce8;}
.sv-r02{background:rgba(76,196,154,.12);color:#6dcca8;}
.sv-r03{background:rgba(224,168,74,.12);color:#e8bc6c;}
.sv-r04{background:rgba(212,104,152,.12);color:#e890b4;}
.sv-r05{background:rgba(154,143,224,.12);color:#b0a8e8;}
.sv-r06{background:rgba(224,112,80,.12);color:#e88870;}
.sv-r07{background:rgba(224,90,90,.12);color:#e89090;}
.sv-r08{background:rgba(122,192,80,.12);color:#96cc6a;}
.sv-r09{background:rgba(64,184,144,.12);color:#70c8a8;}
.sv-r10{background:rgba(176,122,192,.12);color:#c098d8;}

/* ── 統計ページ共通 ── */
.metrics-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;margin-bottom:24px;
}
@media(min-width:480px){.metrics-grid{grid-template-columns:repeat(4,1fr);}}
.m-card{
  background:var(--ink2);border:1px solid var(--dim);
  border-radius:var(--radius-sm);padding:12px 14px;
}
.m-card .mc-label{font-size:10px;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.m-card .mc-val{font-family:'Meiryo','メイリオ',sans-serif;font-size:clamp(.85rem,2vw,1rem);font-weight:600;color:var(--gold);line-height:1.2;}

.sec-head{font-size:10px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--dim);}

/* バーチャート */
.sv-bars{margin-bottom:28px;}
.sv-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.sv-bar-name{font-size:11px;color:var(--txt2);min-width:70px;flex-shrink:0;}
.sv-bar-track{flex:1;background:var(--dim3);border-radius:2px;height:12px;overflow:hidden;}
.sv-bar-fill{height:12px;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.sv-bar-meta{font-size:11px;color:var(--txt2);white-space:nowrap;flex-shrink:0;min-width:100px;}
.sv-bar-meta strong{font-family:'Meiryo','メイリオ',sans-serif;font-size:.82rem;color:var(--txt);margin-right:4px;}

.chart-box{background:var(--ink2);border:1px solid var(--dim);border-radius:var(--radius);padding:14px;margin-bottom:24px;}
.chart-box .chart-inner{position:relative;width:100%;}

/* 帯テーブル */
.band-tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--dim);}
table.band-tbl{width:100%;border-collapse:collapse;min-width:440px;}
table.band-tbl th{
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--txt3);font-weight:500;padding:9px 10px;text-align:center;
  background:var(--ink2);border-bottom:1px solid var(--dim);
}
table.band-tbl th:first-child{text-align:left;}
table.band-tbl td{padding:8px 10px;text-align:center;font-size:12px;color:var(--txt3);border-bottom:1px solid var(--dim3);}
table.band-tbl td:first-child{text-align:left;color:var(--txt2);}
table.band-tbl td.hv{color:var(--txt);font-weight:500;}
table.band-tbl tr:last-child td{border-bottom:none;}
table.band-tbl td.total{font-family:'Meiryo','メイリオ',sans-serif;color:var(--gold);}

/* ── responsive overrides ── */
@media(max-width:480px){
  .hd-inner{padding:12px 14px 0;}
  .tab-btn{padding:10px 14px;}
  .tab-pane{padding:14px 12px 80px;}
  .filter-bar{grid-template-columns:1fr;}
  .fi.full{grid-column:1/-1;}
  .tbl-wrap{border-radius:var(--radius-sm);}
  .bp-track{width:40px;}
}
@media(min-width:768px){
  .hd-inner{padding:20px 28px 0;}
  .tab-pane{padding:24px 28px 80px;}
  .filter-bar{grid-template-columns:2fr 1fr 1fr 1fr;}
  .metrics-grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>
<body>

<header>

      <div>
        <div class="hd-title">Load Nine</div>
      </div>
      <div class="hd-sub">戦闘力ランキング — World TOP 500</div>
    </div>
    <div class="stats-row">
      <div class="stat-chip"><span class="sc-label">Total</span><span class="sc-val">500</span></div>
      <div class="stat-chip"><span class="sc-label">1位</span><span class="sc-val">168,503</span></div>
      <div class="stat-chip"><span class="sc-label">500位</span><span class="sc-val">99,171</span></div>
      <div class="stat-chip"><span class="sc-label">表示</span><span class="sc-val" id="dispCount">500</span></div>
    </div>
  </div>
  <nav class="tabs">
    <button class="tab-btn active" onclick="switchTab('list',this)">ランキング</button>
    <button class="tab-btn" onclick="switchTab('server',this)">サーバー比較</button>
    <button class="tab-btn" onclick="switchTab('band',this)">戦闘力帯分布</button>
  </nav>
</header>

<!-- ランキング一覧 -->
<div id="tab-list" class="tab-pane active">
  <div class="filter-bar">
    <div class="fi full">
      <svg class="fi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchName" placeholder="プレイヤー名 / ギルド名で検索" oninput="applyFilter()">
    </div>
    <div class="fi">
      <span class="fi-label">順位</span>
      <input type="number" id="rankMin" placeholder="1" oninput="applyFilter()">
      <span class="fi-sep">—</span>
      <input type="number" id="rankMax" placeholder="500" oninput="applyFilter()">
    </div>
    <div class="fi">
      <span class="fi-label">戦闘力</span>
      <input type="number" id="bpMin" placeholder="下限" oninput="applyFilter()">
      <span class="fi-sep">—</span>
      <input type="number" id="bpMax" placeholder="上限" oninput="applyFilter()">
    </div>
    <div class="fi full">
      <svg class="fi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      <select id="svFilter" onchange="applyFilter()">
        <option value="">全サーバー</option>
        <option>リカード01</option><option>リカード02</option><option>リカード03</option>
        <option>リカード04</option><option>リカード05</option><option>リカード06</option>
        <option>リカード07</option><option>リカード08</option><option>リカード09</option>
        <option>リカード10</option>
      </select>
    </div>
    <div class="filter-actions">
      <button class="btn-reset" onclick="resetFilter()">リセット</button>
      <span class="match-count"><em id="matchCount">500</em> 件</span>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('rank')" class="sorted" data-col="rank">順位<span class="si">↑</span></th>
        <th onclick="sortBy('player')" data-col="player">プレイヤー<span class="si">↕</span></th>
        <th onclick="sortBy('server')" data-col="server">サーバー<span class="si">↕</span></th>
        <th onclick="sortBy('guild')" data-col="guild">ギルド<span class="si">↕</span></th>
        <th onclick="sortBy('bp')" data-col="bp" style="text-align:right">戦闘力<span class="si">↕</span></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- サーバー比較 -->
<div id="tab-server" class="tab-pane">
  <div class="metrics-grid" id="serverMetrics"></div>
  <div class="sec-head">プレイヤー数 / 平均戦闘力</div>
  <div class="sv-bars" id="serverBars"></div>
  <div class="chart-box">
    <div class="sec-head" style="margin-bottom:10px">平均戦闘力 比較</div>
    <div class="chart-inner" style="height:240px"><canvas id="serverChart"></canvas></div>
  </div>
</div>

<!-- 戦闘力帯分布 -->
<div id="tab-band" class="tab-pane">
  <div class="sec-head">戦闘力帯 × サーバー別 人数分布</div>
  <div class="chart-box">
    <div class="chart-inner" style="height:320px"><canvas id="bandChart"></canvas></div>
  </div>
  <div class="band-tbl-wrap"><table class="band-tbl" id="bandTable"></table></div>
</div>

const SERVERS=['リカード01','リカード02','リカード03','リカード04','リカード05','リカード06','リカード07','リカード08','リカード09','リカード10'];
const CLRS=['#5a9fe0','#4cc49a','#e0a84a','#d46898','#9a8fe0','#e07050','#e05a5a','#7ac050','#40b890','#b07ac0'];
const MAX_BP=RAW[0][4];
function svCls(s){return 'sv-r0'+s.replace('リカード','');}

// タブ
function switchTab(id,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='server'&&!window._sv){renderServer();window._sv=true;}
  if(id==='band'&&!window._bd){renderBand();window._bd=true;}
}

// ランキング
let sCol='rank',sAsc=true;
function renderTable(rows){
  const tb=document.getElementById('tbody');
  if(!rows.length){
    tb.innerHTML='<tr class="empty-row"><td colspan="5">該当するプレイヤーが見つかりません</td></tr>';
    ['matchCount','dispCount'].forEach(id=>document.getElementById(id).textContent='0');return;
  }
  tb.innerHTML=rows.map(([rank,player,sv,guild,bp])=>{
    const rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    const md=rank===1?'◆ ':rank===2?'◇ ':rank===3?'▷ ':'';
    const bw=Math.round(bp/MAX_BP*100);
    const gd=(!guild||guild==='-')?'<span style="color:var(--txt3)">—</span>':guild;
    return`<tr>
      <td class="td-rank ${rc}">${md}${rank}</td>
      <td class="td-player">${player}</td>
      <td><span class="sv-badge ${svCls(sv)}">${sv}</span></td>
      <td class="td-guild" title="${guild}">${gd}</td>
      <td class="td-bp"><div class="bp-row"><div class="bp-track"><div class="bp-fill" style="width:${bw}%"></div></div>${bp.toLocaleString()}</div></td>
    </tr>`;
  }).join('');
  document.getElementById('matchCount').textContent=rows.length;
  document.getElementById('dispCount').textContent=rows.length;
}
function applyFilter(){
  const name=document.getElementById('searchName').value.trim().toLowerCase();
  const rmin=parseInt(document.getElementById('rankMin').value)||1;
  const rmax=parseInt(document.getElementById('rankMax').value)||500;
  const bmin=parseInt(document.getElementById('bpMin').value)||0;
  const bmax=parseInt(document.getElementById('bpMax').value)||999999;
  const sv=document.getElementById('svFilter').value;
  let f=RAW.filter(([rank,player,server,guild,bp])=>{
    if(name&&!player.toLowerCase().includes(name)&&!(guild||'').toLowerCase().includes(name))return false;
    if(rank<rmin||rank>rmax)return false;
    if(bp<bmin||bp>bmax)return false;
    if(sv&&server!==sv)return false;
    return true;
  });
  renderTable(sortData(f,sCol,sAsc));
}
function sortData(rows,col,asc){
  const idx={rank:0,player:1,server:2,guild:3,bp:4}[col];
  return[...rows].sort((a,b)=>{const va=a[idx],vb=b[idx];if(typeof va==='number')return asc?va-vb:vb-va;return asc?String(va).localeCompare(String(vb),'ja'):String(vb).localeCompare(String(va),'ja');});
}
function sortBy(col){
  if(sCol===col)sAsc=!sAsc;else{sCol=col;sAsc=col!=='bp';}
  document.querySelectorAll('thead th').forEach(th=>{th.classList.toggle('sorted',th.dataset.col===sCol);th.querySelector('.si').textContent=th.dataset.col===sCol?(sAsc?'↑':'↓'):'↕';});
  applyFilter();
}
function resetFilter(){
  ['searchName','rankMin','rankMax','bpMin','bpMax'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('svFilter').value='';sCol='rank';sAsc=true;
  document.querySelectorAll('thead th').forEach(th=>{th.classList.toggle('sorted',th.dataset.col==='rank');th.querySelector('.si').textContent=th.dataset.col==='rank'?'↑':'↕';});
  applyFilter();
}

// サーバー別
function renderServer(){
  const cnt={},tot={};SERVERS.forEach(s=>{cnt[s]=0;tot[s]=0;});
  RAW.forEach(([,,sv,,bp])=>{cnt[sv]++;tot[sv]+=bp;});
  const sorted=SERVERS.filter(s=>cnt[s]>0).sort((a,b)=>cnt[b]-cnt[a]);
  const maxCnt=Math.max(...sorted.map(s=>cnt[s]));
  const topAvg=sorted.slice().sort((a,b)=>(tot[b]/cnt[b])-(tot[a]/cnt[a]))[0];
  document.getElementById('serverMetrics').innerHTML=
    sorted.slice(0,3).map((s,i)=>`<div class="m-card"><div class="mc-label">${['最多人数','2位','3位'][i]}</div><div class="mc-val">${s}<br><span style="font-size:.8em;color:var(--txt2)">${cnt[s]} 人</span></div></div>`).join('')+
    `<div class="m-card"><div class="mc-label">最高平均戦闘力</div><div class="mc-val" style="font-size:.82rem">${topAvg}<br><span style="font-size:.75rem;color:var(--txt2)">${Math.round(tot[topAvg]/cnt[topAvg]).toLocaleString()}</span></div></div>`;
  document.getElementById('serverBars').innerHTML=sorted.map(s=>{
    const pct=Math.round(cnt[s]/maxCnt*100);
    const avg=Math.round(tot[s]/cnt[s]).toLocaleString();
    const col=CLRS[SERVERS.indexOf(s)];
    return`<div class="sv-bar-row">
      <span class="sv-bar-name">${s}</span>
      <div class="sv-bar-track"><div class="sv-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <span class="sv-bar-meta"><strong>${cnt[s]}</strong>人 avg ${avg}</span>
    </div>`;
  }).join('');
  new Chart(document.getElementById('serverChart'),{type:'bar',
    data:{labels:sorted,datasets:[{label:'平均戦闘力',data:sorted.map(s=>Math.round(tot[s]/cnt[s])),backgroundColor:sorted.map(s=>CLRS[SERVERS.indexOf(s)]+'cc'),borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'avg: '+c.raw.toLocaleString()},bodyFont:{family:'Meiryo'}}},
      scales:{y:{ticks:{callback:v=>(v/1000).toFixed(0)+'k',font:{size:11},color:'#4a5060'},grid:{color:'rgba(255,255,255,0.04)'}},
              x:{ticks:{font:{size:10},color:'#4a5060'},grid:{display:false}}}}});
}

// 戦闘力帯
function renderBand(){
  const bands=['160k+','150–160k','140–150k','130–140k','120–130k','110–120k','100–110k','90–100k'];
  const ranges=[[160000,999999],[150000,159999],[140000,149999],[130000,139999],[120000,129999],[110000,119999],[100000,109999],[90000,99999]];
  const active=SERVERS.filter(s=>RAW.some(([,,sv])=>sv===s));
  const mx={};active.forEach(s=>{mx[s]=Array(bands.length).fill(0);});
  RAW.forEach(([,,sv,,bp])=>{ranges.forEach(([lo,hi],i)=>{if(bp>=lo&&bp<=hi)mx[sv][i]++;});});
  new Chart(document.getElementById('bandChart'),{type:'bar',
    data:{labels:bands,datasets:active.map(s=>({label:s,data:mx[s],backgroundColor:CLRS[SERVERS.indexOf(s)]+'b0',borderRadius:3,stack:'s'}))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11,family:'Meiryo'},color:'#7a8494',boxWidth:10,padding:12}}},
      scales:{y:{stacked:true,ticks:{font:{size:11},color:'#4a5060'},grid:{color:'rgba(255,255,255,0.04)'}},
              x:{stacked:true,ticks:{font:{size:10},color:'#4a5060'},grid:{display:false}}}}});
  let h='<thead><tr><th>戦闘力帯</th>'+active.map(s=>`<th>${s.replace('リカード','R')}</th>`).join('')+'<th>計</th></tr></thead><tbody>';
  bands.forEach((b,i)=>{
    const tot=active.reduce((s,sv)=>s+mx[sv][i],0);
    h+=`<tr><td>${b}</td>`+active.map(sv=>{const v=mx[sv][i];return`<td class="${v?'hv':''}">${v||'—'}</td>`;}).join('')+`<td class="hv total">${tot}</td></tr>`;
  });
  document.getElementById('bandTable').innerHTML=h+'</tbody>';
}

renderTable(RAW);
