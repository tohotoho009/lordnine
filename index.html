<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lord Nine — 戦闘力ランキング</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --ink:   #080a0e;
  --ink2:  #10141c;
  --ink3:  #181d28;
  --ink4:  #202738;
  --gold:  #c9a84c;
  --gold2: #f0d080;
  --gold3: #7a5a1a;
  --silver:#b0c8d8;
  --bronze:#c09060;
  --dim:   rgba(255,255,255,.07);
  --dim2:  rgba(255,255,255,.13);
  --dim3:  rgba(255,255,255,.03);
  --txt:   #e8e2d6;
  --txt2:  #7a8898;
  --txt3:  #3a4456;
  --r01:#5a9fe0;--r02:#4cc49a;--r03:#e0a84a;--r04:#d46898;--r05:#9a8fe0;
  --r06:#e07050;--r07:#e05a5a;--r08:#7ac050;--r09:#40b890;--r10:#b07ac0;
  --fs-xl:clamp(1.5rem,4.5vw,2.2rem);
  --fs-sm:clamp(0.7rem,1.8vw,0.78rem);
  --radius:14px;--radius-sm:9px;
  --ease:.2s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Meiryo','メイリオ','Yu Gothic','游ゴシック',sans-serif;
  background:var(--ink);color:var(--txt);min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 15% -5%,rgba(201,168,76,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 35% at 85% 105%,rgba(90,159,224,.05) 0%,transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,.011) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.011) 1px,transparent 1px);
  background-size:48px 48px;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(8,10,14,.96);
  backdrop-filter:blur(20px) saturate(1.5);
  -webkit-backdrop-filter:blur(20px) saturate(1.5);
  border-bottom:1px solid var(--dim);
  padding:env(safe-area-inset-top,0) 0 0;
}
.hd-inner{padding:14px 20px 0;}
.hd-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.hd-icon{
  width:40px;height:40px;flex-shrink:0;border-radius:11px;
  background:linear-gradient(135deg,var(--gold3) 0%,var(--gold) 100%);
  display:flex;align-items:center;justify-content:center;font-size:1.25rem;
  box-shadow:0 0 22px rgba(201,168,76,.28),0 2px 8px rgba(0,0,0,.4);
}
.hd-texts{flex:1;min-width:0;}
.hd-title{
  font-size:var(--fs-xl);font-weight:800;letter-spacing:.1em;line-height:1;
  background:linear-gradient(130deg,var(--gold2) 0%,var(--gold) 50%,#8a6020 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hd-sub{font-size:9px;color:var(--txt3);letter-spacing:.12em;text-transform:uppercase;margin-top:3px;}
.stats-row{display:flex;overflow-x:auto;scrollbar-width:none;}
.stats-row::-webkit-scrollbar{display:none;}
.stat-chip{
  flex:none;display:flex;flex-direction:column;align-items:flex-start;
  padding:8px 16px;border-right:1px solid var(--dim);gap:1px;
}
.stat-chip:last-child{border-right:none;}
.sc-label{font-size:9px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
.sc-val{font-size:clamp(.88rem,2.5vw,1.05rem);font-weight:700;color:var(--gold);white-space:nowrap;font-variant-numeric:tabular-nums;}
.tabs{
  display:flex;overflow-x:auto;scrollbar-width:none;
  border-top:1px solid var(--dim);margin-top:8px;
}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:none;background:none;border:none;font-family:inherit;
  font-size:var(--fs-sm);font-weight:500;color:var(--txt2);
  padding:10px 18px;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color var(--ease),border-color var(--ease);
  white-space:nowrap;letter-spacing:.04em;
  display:flex;align-items:center;gap:6px;
}
.tab-btn:hover{color:var(--txt);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.tc{
  font-size:9px;background:var(--dim);color:var(--txt2);
  padding:1px 5px;border-radius:10px;font-weight:400;
  transition:background var(--ease),color var(--ease);
}
.tab-btn.active .tc{background:rgba(201,168,76,.15);color:var(--gold);}

/* ── PANES ── */
.tab-pane{display:none;padding:20px 18px 110px;animation:fadeUp .22s ease;}
.tab-pane.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* ── PODIUM ── */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:24px;}
.podium-card{
  flex:1;max-width:160px;border-radius:var(--radius);
  padding:16px 10px 14px;text-align:center;position:relative;overflow:hidden;
  cursor:default;transition:transform var(--ease),box-shadow var(--ease);
  background:var(--ink2);border:1px solid var(--dim);
}
.podium-card:hover{transform:translateY(-4px);}
.podium-card.p1{
  background:linear-gradient(155deg,rgba(201,168,76,.18) 0%,var(--ink2) 55%);
  border-color:rgba(201,168,76,.38);
  box-shadow:0 0 32px rgba(201,168,76,.12),0 4px 16px rgba(0,0,0,.3);
  padding-top:20px;
}
.podium-card.p2{background:linear-gradient(155deg,rgba(176,200,216,.09) 0%,var(--ink2) 55%);border-color:rgba(176,200,216,.22);}
.podium-card.p3{background:linear-gradient(155deg,rgba(192,144,96,.09) 0%,var(--ink2) 55%);border-color:rgba(192,144,96,.22);}
.podium-crown{font-size:1.7rem;line-height:1;margin-bottom:6px;}
.podium-rank{font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.p1 .podium-rank{color:var(--gold);}
.p2 .podium-rank{color:var(--silver);}
.p3 .podium-rank{color:var(--bronze);}
.podium-av{
  width:44px;height:44px;border-radius:50%;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;
}
.p1 .podium-av{background:rgba(201,168,76,.2);color:var(--gold);}
.p2 .podium-av{background:rgba(176,200,216,.15);color:var(--silver);}
.p3 .podium-av{background:rgba(192,144,96,.15);color:var(--bronze);}
.podium-name{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.podium-sv{font-size:.64rem;color:var(--txt2);margin-top:3px;}
.podium-bp{font-size:.88rem;font-weight:700;margin-top:8px;font-variant-numeric:tabular-nums;}
.p1 .podium-bp{color:var(--gold2);}
.p2 .podium-bp{color:var(--silver);}
.p3 .podium-bp{color:var(--bronze);}

/* ── FILTERS ── */
.filter-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.filter-bar .full{grid-column:1/-1;}
.fi{
  display:flex;align-items:center;gap:8px;
  background:var(--ink2);border:1px solid var(--dim);
  border-radius:var(--radius-sm);padding:9px 12px;
  transition:border-color var(--ease),box-shadow var(--ease);
}
.fi:focus-within{border-color:rgba(201,168,76,.45);box-shadow:0 0 0 2px rgba(201,168,76,.05);}
.fi-icon{color:var(--txt3);flex-shrink:0;width:14px;height:14px;}
.fi-label{font-size:10px;color:var(--txt3);white-space:nowrap;letter-spacing:.04em;}
input[type=text],input[type=number],select{
  background:none;border:none;outline:none;color:var(--txt);
  font-family:inherit;font-size:var(--fs-sm);width:100%;min-width:0;
}
input[type=text]::placeholder{color:var(--txt3);}
input[type=number]{width:52px;text-align:center;font-size:.85rem;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
select option{background:var(--ink2);}
.fi-sep{color:var(--txt3);font-size:11px;flex-shrink:0;}

/* server chips */
.sv-chips{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:6px;}
.sv-chip{
  padding:4px 10px;border-radius:20px;font-size:10px;font-weight:500;
  background:var(--dim3);border:1px solid var(--dim);color:var(--txt2);
  cursor:pointer;transition:all var(--ease);white-space:nowrap;
  --col:#fff;
}
.sv-chip:hover{border-color:var(--dim2);color:var(--txt);}
.sv-chip.active{background:var(--col);border-color:transparent;color:#0a0c10;font-weight:700;}

.filter-actions{
  grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.btn-reset{
  background:none;border:1px solid var(--dim2);border-radius:20px;
  color:var(--txt2);font-family:inherit;font-size:11px;padding:5px 14px;
  cursor:pointer;transition:all var(--ease);
}
.btn-reset:hover{border-color:var(--gold);color:var(--gold);}
.match-count{font-size:12px;color:var(--txt2);}
.match-count em{font-style:normal;font-size:14px;font-weight:700;color:var(--gold);}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);border:1px solid var(--dim);}
table{width:100%;border-collapse:collapse;min-width:460px;}
thead th{
  font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);
  font-weight:600;padding:10px 14px;text-align:left;
  background:var(--ink2);border-bottom:1px solid var(--dim);
  cursor:pointer;user-select:none;white-space:nowrap;
  transition:color var(--ease);
}
thead th:hover{color:var(--gold2);}
thead th.sorted{color:var(--gold);}
.si{font-size:8px;opacity:.4;margin-left:4px;}
thead th.sorted .si{opacity:1;}
tbody tr{border-bottom:1px solid var(--dim3);transition:background var(--ease);}
tbody tr:hover{background:rgba(201,168,76,.05);}
tbody tr:last-child{border-bottom:none;}
td{padding:11px 14px;font-size:var(--fs-sm);vertical-align:middle;}
.td-rank{font-size:.9rem;font-weight:700;color:var(--txt3);width:54px;font-variant-numeric:tabular-nums;}
.td-rank.r1{color:var(--gold2);}
.td-rank.r2{color:var(--silver);}
.td-rank.r3{color:var(--bronze);}
.player-cell{display:flex;align-items:center;gap:8px;}
.p-av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:700;
}
.td-player{font-weight:600;font-size:.82rem;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sv-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-block;white-space:nowrap;}
.td-guild{font-size:.72rem;color:var(--txt2);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.g-link{cursor:pointer;transition:color var(--ease);}
.g-link:hover{color:var(--gold);}
.td-bp{font-size:.88rem;font-weight:700;text-align:right;white-space:nowrap;}
.bp-row{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.bp-track{width:52px;height:3px;background:var(--dim);border-radius:2px;flex-shrink:0;overflow:hidden;}
.bp-fill{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--gold3),var(--gold) 60%,var(--gold2));}
.bp-val{font-variant-numeric:tabular-nums;}
mark{background:rgba(201,168,76,.22);color:var(--gold2);border-radius:2px;padding:0 1px;}
.empty-row td{text-align:center;padding:60px 16px;color:var(--txt3);}
.empty-icon{font-size:2.2rem;margin-bottom:8px;}
.empty-msg{font-size:.84rem;}

/* server badge colors */
.sv-r01{background:rgba(90,159,224,.12);color:#7abce8;}
.sv-r02{background:rgba(76,196,154,.12);color:#6dcca8;}
.sv-r03{background:rgba(224,168,74,.12);color:#e8bc6c;}
.sv-r04{background:rgba(212,104,152,.12);color:#e890b4;}
.sv-r05{background:rgba(154,143,224,.12);color:#b0a8e8;}
.sv-r06{background:rgba(224,112,80,.12);color:#e88870;}
.sv-r07{background:rgba(224,90,90,.12);color:#e89090;}
.sv-r08{background:rgba(122,192,80,.12);color:#96cc6a;}
.sv-r09{background:rgba(64,184,144,.12);color:#70c8a8;}
.sv-r10{background:rgba(176,122,192,.12);color:#c098d8;}

/* ── STATS PAGES ── */
.metrics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
@media(min-width:480px){.metrics-grid{grid-template-columns:repeat(4,1fr);}}
.m-card{
  background:var(--ink2);border:1px solid var(--dim);border-radius:var(--radius-sm);
  padding:14px 16px;transition:border-color var(--ease),box-shadow var(--ease);
}
.m-card:hover{border-color:rgba(201,168,76,.2);box-shadow:0 0 18px rgba(201,168,76,.04);}
.mc-label{font-size:9px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.mc-val{font-size:clamp(.82rem,2vw,.98rem);font-weight:700;color:var(--gold);line-height:1.3;}
.sec-head{
  font-size:9px;color:var(--txt3);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--dim);
  display:flex;align-items:center;gap:8px;
}
.sec-head::before{content:'';width:2px;height:12px;background:var(--gold);border-radius:1px;flex-shrink:0;}
.sv-bars{margin-bottom:28px;}
.sv-bar-row{
  display:flex;align-items:center;gap:10px;margin-bottom:8px;
  padding:6px 10px;border-radius:var(--radius-sm);transition:background var(--ease);
}
.sv-bar-row:hover{background:var(--dim3);}
.sv-bar-name{font-size:11px;color:var(--txt2);min-width:72px;flex-shrink:0;}
.sv-bar-track{flex:1;background:var(--dim3);border-radius:3px;height:8px;overflow:hidden;}
.sv-bar-fill{height:8px;border-radius:3px;transition:width .9s cubic-bezier(.4,0,.2,1);}
.sv-bar-meta{font-size:11px;color:var(--txt2);white-space:nowrap;flex-shrink:0;min-width:100px;text-align:right;}
.sv-bar-meta strong{font-size:.82rem;color:var(--txt);margin-right:3px;font-variant-numeric:tabular-nums;}
.chart-box{background:var(--ink2);border:1px solid var(--dim);border-radius:var(--radius);padding:16px;margin-bottom:24px;}
.chart-inner{position:relative;width:100%;}
.band-tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--dim);}
table.band-tbl{width:100%;border-collapse:collapse;min-width:440px;}
table.band-tbl th{
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);
  font-weight:600;padding:10px 12px;text-align:center;
  background:var(--ink2);border-bottom:1px solid var(--dim);
}
table.band-tbl th:first-child{text-align:left;}
table.band-tbl td{padding:8px 12px;text-align:center;font-size:12px;color:var(--txt3);border-bottom:1px solid var(--dim3);}
table.band-tbl td:first-child{text-align:left;color:var(--txt2);}
table.band-tbl td.hv{color:var(--txt);font-weight:600;}
table.band-tbl tr:last-child td{border-bottom:none;}
table.band-tbl td.total{color:var(--gold);font-weight:700;}

/* ── SCROLL TOP ── */
#scrollTop{
  position:fixed;bottom:24px;right:18px;z-index:100;
  width:42px;height:42px;background:rgba(10,12,18,.92);
  border:1px solid var(--dim2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;pointer-events:none;
  transition:opacity var(--ease),transform var(--ease),border-color var(--ease),box-shadow var(--ease);
  backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.4);
}
#scrollTop.show{opacity:1;pointer-events:auto;}
#scrollTop:hover{border-color:var(--gold);box-shadow:0 0 18px rgba(201,168,76,.2);transform:translateY(-2px);}
#scrollTop svg{color:var(--txt2);transition:color var(--ease);}
#scrollTop:hover svg{color:var(--gold);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--ink3);border:1px solid var(--dim2);
  color:var(--txt);font-size:12px;padding:8px 18px;border-radius:20px;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  z-index:300;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .hd-inner{padding:10px 14px 0;}
  .tab-btn{padding:9px 13px;}
  .tab-pane{padding:14px 12px 110px;}
  .filter-bar{grid-template-columns:1fr;}
  .tbl-wrap{border-radius:var(--radius-sm);}
  .bp-track{width:36px;}
  .podium-card{max-width:none;padding:12px 8px 10px;}
  .podium-av{width:36px;height:36px;font-size:.8rem;}
}
@media(min-width:768px){
  .hd-inner{padding:18px 32px 0;}
  .tab-pane{padding:28px 32px 110px;}
  .filter-bar{grid-template-columns:2fr 1fr 1fr;}
  .metrics-grid{grid-template-columns:repeat(4,1fr);}
  .podium-card{max-width:200px;}
}
</style>
</head>
<body>

<header>
  <div class="hd-inner">
    <div class="hd-top">
      <div class="hd-icon">⚔️</div>
      <div class="hd-texts">
        <div class="hd-title">Lord Nine</div>
        <div class="hd-sub">Battle Power Ranking — World TOP 500</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-chip"><span class="sc-label">Total</span><span class="sc-val" id="totalCount">—</span></div>
      <div class="stat-chip"><span class="sc-label">1st</span><span class="sc-val" id="topBP">—</span></div>
      <div class="stat-chip"><span class="sc-label">500th</span><span class="sc-val" id="lastBP">—</span></div>
      <div class="stat-chip"><span class="sc-label">表示中</span><span class="sc-val" id="dispCount">—</span></div>
    </div>
  </div>
  <nav class="tabs">
    <button class="tab-btn active" onclick="switchTab('list',this)">ランキング<span class="tc" id="tc-list">500</span></button>
    <button class="tab-btn" onclick="switchTab('server',this)">サーバー<span class="tc">10</span></button>
    <button class="tab-btn" onclick="switchTab('band',this)">戦闘力帯</button>
    <button class="tab-btn" onclick="switchTab('guild',this)">ギルド別<span class="tc" id="tc-guild">—</span></button>
  </nav>
</header>

<!-- ランキング -->
<div id="tab-list" class="tab-pane active">
  <div class="podium" id="podium"></div>
  <div class="filter-bar">
    <div class="fi full">
      <svg class="fi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchName" placeholder="プレイヤー名 / ギルド名で検索…  ( / キーでフォーカス)" oninput="applyFilter()">
    </div>
    <div class="fi">
      <span class="fi-label">順位</span>
      <input type="number" id="rankMin" placeholder="1" oninput="applyFilter()">
      <span class="fi-sep">—</span>
      <input type="number" id="rankMax" placeholder="500" oninput="applyFilter()">
    </div>
    <div class="fi">
      <span class="fi-label">戦闘力</span>
      <input type="number" id="bpMin" placeholder="下限" oninput="applyFilter()">
      <span class="fi-sep">—</span>
      <input type="number" id="bpMax" placeholder="上限" oninput="applyFilter()">
    </div>
    <div class="sv-chips full" id="svChips"></div>
    <div class="filter-actions">
      <button class="btn-reset" onclick="resetFilter()">✕ リセット</button>
      <span class="match-count"><em id="matchCount">500</em> 件</span>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('rank')" class="sorted" data-col="rank">順位<span class="si">↑</span></th>
        <th onclick="sortBy('player')" data-col="player">プレイヤー<span class="si">↕</span></th>
        <th onclick="sortBy('server')" data-col="server">サーバー<span class="si">↕</span></th>
        <th onclick="sortBy('guild')" data-col="guild">ギルド<span class="si">↕</span></th>
        <th onclick="sortBy('bp')" data-col="bp" style="text-align:right">戦闘力<span class="si">↕</span></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- サーバー比較 -->
<div id="tab-server" class="tab-pane">
  <div class="metrics-grid" id="serverMetrics"></div>
  <div class="sec-head">プレイヤー数 / 平均戦闘力</div>
  <div class="sv-bars" id="serverBars"></div>
  <div class="chart-box">
    <div class="sec-head" style="margin-bottom:12px">平均戦闘力 比較</div>
    <div class="chart-inner" style="height:260px"><canvas id="serverChart"></canvas></div>
  </div>
</div>

<!-- 戦闘力帯分布 -->
<div id="tab-band" class="tab-pane">
  <div class="sec-head">戦闘力帯 × サーバー別 人数分布</div>
  <div class="chart-box">
    <div class="chart-inner" style="height:320px"><canvas id="bandChart"></canvas></div>
  </div>
  <div class="band-tbl-wrap"><table class="band-tbl" id="bandTable"></table></div>
</div>

<!-- ギルド別 -->
<div id="tab-guild" class="tab-pane">
  <div class="metrics-grid" id="guildMetrics"></div>
  <div class="sec-head">人数上位ギルド</div>
  <div class="sv-bars" id="guildBars"></div>
  <div class="chart-box">
    <div class="sec-head" style="margin-bottom:12px">平均戦闘力 比較（人数上位15）</div>
    <div class="chart-inner" style="height:310px"><canvas id="guildChart"></canvas></div>
  </div>
  <div class="sec-head">全ギルド一覧</div>
  <div class="band-tbl-wrap"><table class="band-tbl" id="guildTable"></table></div>
</div>

<button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="先頭へ">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<div class="toast" id="toast"></div>

<script>
const SERVERS=['リカード01','リカード02','リカード03','リカード04','リカード05',
               'リカード06','リカード07','リカード08','リカード09','リカード10'];
const CLRS=['#5a9fe0','#4cc49a','#e0a84a','#d46898','#9a8fe0',
            '#e07050','#e05a5a','#7ac050','#40b890','#b07ac0'];
let RAW=[],MAX_BP=0;

function svCls(s){
  const n=parseInt(s.replace('リカード',''));
  return 'sv-r'+String(n).padStart(2,'0');
}

// scroll-to-top
window.addEventListener('scroll',()=>{
  document.getElementById('scrollTop').classList.toggle('show',window.scrollY>280);
},{passive:true});

// toast
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// keyboard shortcut: / → focus search
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){
    e.preventDefault();
    document.getElementById('searchName').focus();
    document.querySelectorAll('.tab-btn')[0].click();
  }
  if(e.key==='Escape') document.activeElement.blur();
});

// server chips
const CHIP_COLORS=CLRS;
function buildSvChips(){
  const active=SERVERS.filter(s=>RAW.some(r=>r[2]===s));
  document.getElementById('svChips').innerHTML=active.map(s=>{
    const col=CLRS[SERVERS.indexOf(s)];
    return`<button class="sv-chip" data-sv="${s}" style="--col:${col}"
      onclick="toggleChip(this)">${s.replace('リカード','R')}</button>`;
  }).join('');
}
function toggleChip(el){
  const was=el.classList.contains('active');
  document.querySelectorAll('.sv-chip').forEach(c=>c.classList.remove('active'));
  if(!was) el.classList.add('active');
  applyFilter();
}

// tabs
function switchTab(id,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='server'&&!window._sv){renderServer();window._sv=true;}
  if(id==='band'&&!window._bd){renderBand();window._bd=true;}
  if(id==='guild'&&!window._gd){renderGuild();window._gd=true;}
}

// podium top 3
function renderPodium(){
  const crowns=['👑','🥈','🥉'],cls=['p1','p2','p3'],labels=['1ST','2ND','3RD'];
  document.getElementById('podium').innerHTML=RAW.slice(0,3).map(([rank,player,sv,guild,bp],i)=>`
    <div class="podium-card ${cls[i]}">
      <div class="podium-crown">${crowns[i]}</div>
      <div class="podium-rank">${labels[i]}</div>
      <div class="podium-av">${player.slice(0,1)}</div>
      <div class="podium-name" title="${player}">${player}</div>
      <div class="podium-sv"><span class="sv-badge ${svCls(sv)}">${sv.replace('リカード','R')}</span></div>
      <div class="podium-bp">${bp.toLocaleString()}</div>
    </div>`).join('');
}

// avatar accent color per name
function avColor(name){
  let h=0;for(const c of name)h=(h*31+c.charCodeAt(0))&0xffffff;
  return CLRS[Math.abs(h)%CLRS.length];
}

// highlight search term
function hl(text,q){
  if(!q||!text)return text||'';
  return String(text).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

// ranking table
let sCol='rank',sAsc=true;
function renderTable(rows){
  const tb=document.getElementById('tbody');
  const q=document.getElementById('searchName').value.trim();
  if(!rows.length){
    tb.innerHTML=`<tr class="empty-row"><td colspan="5"><div class="empty-icon">🔍</div><div class="empty-msg">該当するプレイヤーが見つかりません</div></td></tr>`;
    document.getElementById('matchCount').textContent='0';
    document.getElementById('dispCount').textContent='0';
    document.getElementById('tc-list').textContent='0';
    return;
  }
  tb.innerHTML=rows.map(([rank,player,sv,guild,bp])=>{
    const rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    const medal=rank===1?'👑':rank===2?'🥈':rank===3?'🥉':'';
    const bw=Math.round(bp/MAX_BP*100);
    const gd=(!guild||guild==='-')
      ?'<span style="color:var(--txt3)">—</span>'
      :`<span class="g-link" onclick="filterGuild('${guild.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${hl(guild,q)}</span>`;
    const col=avColor(player);
    return`<tr>
      <td class="td-rank ${rc}">${medal||rank}</td>
      <td><div class="player-cell">
        <div class="p-av" style="background:${col}22;color:${col}">${player.slice(0,1)}</div>
        <span class="td-player" title="${player}">${hl(player,q)}</span>
      </div></td>
      <td><span class="sv-badge ${svCls(sv)}">${sv}</span></td>
      <td class="td-guild" title="${guild||''}">${gd}</td>
      <td class="td-bp"><div class="bp-row">
        <div class="bp-track"><div class="bp-fill" style="width:${bw}%"></div></div>
        <span class="bp-val">${bp.toLocaleString()}</span>
      </div></td>
    </tr>`;
  }).join('');
  document.getElementById('matchCount').textContent=rows.length;
  document.getElementById('dispCount').textContent=rows.length;
  document.getElementById('tc-list').textContent=rows.length;
}

function filterGuild(guild){
  document.getElementById('searchName').value=guild;
  document.querySelectorAll('.sv-chip').forEach(c=>c.classList.remove('active'));
  applyFilter();
  toast(`ギルド「${guild}」でフィルター中`);
}

function applyFilter(){
  const q=document.getElementById('searchName').value.trim().toLowerCase();
  const rmin=parseInt(document.getElementById('rankMin').value)||1;
  const rmax=parseInt(document.getElementById('rankMax').value)||500;
  const bmin=parseInt(document.getElementById('bpMin').value)||0;
  const bmax=parseInt(document.getElementById('bpMax').value)||999999;
  const chip=document.querySelector('.sv-chip.active');
  const sv=chip?chip.dataset.sv:'';
  const f=RAW.filter(([rank,player,server,guild,bp])=>{
    if(q&&!player.toLowerCase().includes(q)&&!(guild||'').toLowerCase().includes(q))return false;
    if(rank<rmin||rank>rmax)return false;
    if(bp<bmin||bp>bmax)return false;
    if(sv&&server!==sv)return false;
    return true;
  });
  renderTable(sortData(f,sCol,sAsc));
}

function sortData(rows,col,asc){
  const idx={rank:0,player:1,server:2,guild:3,bp:4}[col];
  return[...rows].sort((a,b)=>{
    const va=a[idx],vb=b[idx];
    if(typeof va==='number')return asc?va-vb:vb-va;
    return asc?String(va).localeCompare(String(vb),'ja'):String(vb).localeCompare(String(va),'ja');
  });
}

function sortBy(col){
  sCol===col?sAsc=!sAsc:(sCol=col,sAsc=col!=='bp');
  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.toggle('sorted',th.dataset.col===sCol);
    th.querySelector('.si').textContent=th.dataset.col===sCol?(sAsc?'↑':'↓'):'↕';
  });
  applyFilter();
}

function resetFilter(){
  ['searchName','rankMin','rankMax','bpMin','bpMax'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('.sv-chip').forEach(c=>c.classList.remove('active'));
  sCol='rank';sAsc=true;
  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.toggle('sorted',th.dataset.col==='rank');
    th.querySelector('.si').textContent=th.dataset.col==='rank'?'↑':'↕';
  });
  applyFilter();
}

// Chart.js common tooltip defaults
const TOOLTIP={
  backgroundColor:'rgba(14,18,26,.96)',
  borderColor:'rgba(255,255,255,.07)',borderWidth:1,
  padding:10,cornerRadius:8,
  bodyFont:{family:'Meiryo',size:12},
  titleFont:{family:'Meiryo',size:11},
  titleColor:'#7a8898'
};
const TICK_COLOR='#3a4456';
const GRID_COLOR='rgba(255,255,255,.03)';

// サーバー比較
function renderServer(){
  const cnt={},tot={};SERVERS.forEach(s=>{cnt[s]=0;tot[s]=0;});
  RAW.forEach(([,,sv,,bp])=>{cnt[sv]++;tot[sv]+=bp;});
  const sorted=SERVERS.filter(s=>cnt[s]>0).sort((a,b)=>cnt[b]-cnt[a]);
  const maxCnt=Math.max(...sorted.map(s=>cnt[s]));
  const topAvg=sorted.slice().sort((a,b)=>(tot[b]/cnt[b])-(tot[a]/cnt[a]))[0];
  document.getElementById('serverMetrics').innerHTML=
    sorted.slice(0,3).map((s,i)=>`<div class="m-card">
      <div class="mc-label">最多人数 #${i+1}</div>
      <div class="mc-val">${s}<br><span style="font-size:.78em;color:var(--txt2);font-weight:400">${cnt[s]} 人</span></div>
    </div>`).join('')+
    `<div class="m-card">
      <div class="mc-label">最高平均戦闘力</div>
      <div class="mc-val">${topAvg}<br><span style="font-size:.78em;color:var(--txt2);font-weight:400">${Math.round(tot[topAvg]/cnt[topAvg]).toLocaleString()}</span></div>
    </div>`;
  document.getElementById('serverBars').innerHTML=sorted.map(s=>{
    const pct=Math.round(cnt[s]/maxCnt*100);
    const avg=Math.round(tot[s]/cnt[s]).toLocaleString();
    const col=CLRS[SERVERS.indexOf(s)];
    return`<div class="sv-bar-row">
      <span class="sv-bar-name">${s.replace('リカード','R')}</span>
      <div class="sv-bar-track"><div class="sv-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <span class="sv-bar-meta"><strong>${cnt[s]}</strong>人 avg <strong>${avg}</strong></span>
    </div>`;
  }).join('');
  new Chart(document.getElementById('serverChart'),{type:'bar',
    data:{
      labels:sorted.map(s=>s.replace('リカード','R')),
      datasets:[{
        label:'平均戦闘力',
        data:sorted.map(s=>Math.round(tot[s]/cnt[s])),
        backgroundColor:sorted.map(s=>CLRS[SERVERS.indexOf(s)]+'bb'),
        borderColor:sorted.map(s=>CLRS[SERVERS.indexOf(s)]),
        borderWidth:1,borderRadius:7,borderSkipped:false
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...TOOLTIP,callbacks:{label:c=>'平均: '+c.raw.toLocaleString()}}},
      scales:{
        y:{ticks:{callback:v=>(v/1000).toFixed(0)+'k',font:{size:11},color:TICK_COLOR},grid:{color:GRID_COLOR}},
        x:{ticks:{font:{size:10},color:TICK_COLOR},grid:{display:false}}
      }}});
}

// 戦闘力帯
function renderBand(){
  const bands=['160k+','150–160k','140–150k','130–140k','120–130k','110–120k','100–110k','90–100k'];
  const ranges=[[160000,999999],[150000,159999],[140000,149999],[130000,139999],[120000,129999],[110000,119999],[100000,109999],[90000,99999]];
  const active=SERVERS.filter(s=>RAW.some(r=>r[2]===s));
  const mx={};active.forEach(s=>{mx[s]=Array(bands.length).fill(0);});
  RAW.forEach(([,,sv,,bp])=>{ranges.forEach(([lo,hi],i)=>{if(bp>=lo&&bp<=hi)mx[sv][i]++;});});
  new Chart(document.getElementById('bandChart'),{type:'bar',
    data:{
      labels:bands,
      datasets:active.map(s=>({
        label:s.replace('リカード','R'),data:mx[s],
        backgroundColor:CLRS[SERVERS.indexOf(s)]+'a8',
        borderRadius:3,stack:'s'
      }))
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'bottom',labels:{font:{size:11,family:'Meiryo'},color:'#7a8898',boxWidth:10,padding:12}},
        tooltip:{...TOOLTIP}
      },
      scales:{
        y:{stacked:true,ticks:{font:{size:11},color:TICK_COLOR},grid:{color:GRID_COLOR}},
        x:{stacked:true,ticks:{font:{size:10},color:TICK_COLOR},grid:{display:false}}
      }}});
  let h='<thead><tr><th>戦闘力帯</th>'+active.map(s=>`<th>${s.replace('リカード','R')}</th>`).join('')+'<th>計</th></tr></thead><tbody>';
  bands.forEach((b,i)=>{
    const tot=active.reduce((s,sv)=>s+mx[sv][i],0);
    h+=`<tr><td>${b}</td>`+active.map(sv=>{const v=mx[sv][i];return`<td class="${v?'hv':''}">${v||'—'}</td>`;}).join('')+`<td class="hv total">${tot}</td></tr>`;
  });
  document.getElementById('bandTable').innerHTML=h+'</tbody>';
}

// ギルド別
function renderGuild(){
  const gMap={};
  RAW.forEach(([,,sv,guild,bp])=>{
    if(!guild||guild==='-')return;
    if(!gMap[guild])gMap[guild]={bps:[],svs:{}};
    gMap[guild].bps.push(bp);
    gMap[guild].svs[sv]=(gMap[guild].svs[sv]||0)+1;
  });
  const guilds=Object.entries(gMap).map(([name,{bps,svs}])=>{
    const tot=bps.reduce((s,v)=>s+v,0);
    const primSv=Object.entries(svs).sort((a,b)=>b[1]-a[1])[0][0];
    return{name,count:bps.length,svList:Object.keys(svs),primSv,total:tot,avg:Math.round(tot/bps.length),top:Math.max(...bps)};
  });
  guilds.sort((a,b)=>b.count-a.count||b.avg-a.avg);
  const byAvg=[...guilds].sort((a,b)=>b.avg-a.avg)[0];
  const byTot=[...guilds].sort((a,b)=>b.total-a.total)[0];
  document.getElementById('guildMetrics').innerHTML=
    `<div class="m-card"><div class="mc-label">最多人数</div><div class="mc-val">${guilds[0].name}<br><span style="font-size:.78em;color:var(--txt2);font-weight:400">${guilds[0].count} 人</span></div></div>`+
    `<div class="m-card"><div class="mc-label">最高平均戦闘力</div><div class="mc-val">${byAvg.name}<br><span style="font-size:.78em;color:var(--txt2);font-weight:400">${byAvg.avg.toLocaleString()}</span></div></div>`+
    `<div class="m-card"><div class="mc-label">最高合計戦闘力</div><div class="mc-val">${byTot.name}<br><span style="font-size:.78em;color:var(--txt2);font-weight:400">${byTot.total.toLocaleString()}</span></div></div>`+
    `<div class="m-card"><div class="mc-label">ギルド総数</div><div class="mc-val">${guilds.length}</div></div>`;
  document.getElementById('tc-guild').textContent=guilds.length;
  const top15=guilds.slice(0,15);
  const maxCnt=top15[0].count;
  document.getElementById('guildBars').innerHTML=top15.map(g=>{
    const pct=Math.round(g.count/maxCnt*100);
    const col=CLRS[SERVERS.indexOf(g.primSv)];
    return`<div class="sv-bar-row">
      <span class="sv-bar-name" style="min-width:110px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${g.name}">${g.name}</span>
      <div class="sv-bar-track"><div class="sv-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <span class="sv-bar-meta"><strong>${g.count}</strong>人 avg <strong>${g.avg.toLocaleString()}</strong></span>
    </div>`;
  }).join('');
  new Chart(document.getElementById('guildChart'),{type:'bar',
    data:{
      labels:top15.map(g=>g.name.length>8?g.name.slice(0,8)+'…':g.name),
      datasets:[{
        label:'平均戦闘力',data:top15.map(g=>g.avg),
        backgroundColor:top15.map(g=>CLRS[SERVERS.indexOf(g.primSv)]+'bb'),
        borderColor:top15.map(g=>CLRS[SERVERS.indexOf(g.primSv)]),
        borderWidth:1,borderRadius:7,borderSkipped:false
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...TOOLTIP,callbacks:{label:c=>'avg: '+c.raw.toLocaleString()}}},
      scales:{
        y:{ticks:{callback:v=>(v/1000).toFixed(0)+'k',font:{size:11},color:TICK_COLOR},grid:{color:GRID_COLOR}},
        x:{ticks:{font:{size:9},color:TICK_COLOR,maxRotation:45},grid:{display:false}}
      }}});
  let h='<thead><tr><th>#</th><th style="text-align:left">ギルド名</th><th>サーバー</th><th>人数</th><th>平均BP</th><th>最高BP</th><th>合計BP</th></tr></thead><tbody>';
  guilds.forEach((g,i)=>{
    const sv=g.svList.map(s=>`<span class="sv-badge ${svCls(s)}" style="font-size:9px;padding:1px 5px">${s.replace('リカード','R')}</span>`).join(' ');
    h+=`<tr><td>${i+1}</td><td style="text-align:left;color:var(--txt);font-weight:600">${g.name}</td><td>${sv}</td><td class="hv">${g.count}</td><td class="hv">${g.avg.toLocaleString()}</td><td>${g.top.toLocaleString()}</td><td>${g.total.toLocaleString()}</td></tr>`;
  });
  document.getElementById('guildTable').innerHTML=h+'</tbody>';
}

// init
fetch('data.json').then(r=>r.json()).then(data=>{
  RAW=data;MAX_BP=RAW[0][4];
  document.getElementById('totalCount').textContent=RAW.length.toLocaleString();
  document.getElementById('topBP').textContent=RAW[0][4].toLocaleString();
  document.getElementById('lastBP').textContent=RAW[RAW.length-1][4].toLocaleString();
  document.getElementById('dispCount').textContent=RAW.length.toLocaleString();
  renderPodium();
  buildSvChips();
  renderTable(RAW);
}).catch(()=>{
  document.getElementById('tbody').innerHTML=`<tr class="empty-row"><td colspan="5"><div class="empty-icon">⚠️</div><div class="empty-msg">データの読み込みに失敗しました</div></td></tr>`;
});
</script>
</body>
